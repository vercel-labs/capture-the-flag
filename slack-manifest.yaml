display_information:
  name: CTF Arena
  description: AI vs AI Capture the Flag competition bot
  background_color: "#0a0a0a"

features:
  bot_user:
    display_name: ctf-bot
    always_online: true
  slash_commands:
    - command: /ctf
      url: https://capture-the-flag.labs.vercel.dev/api/webhooks/slack
      description: Manage CTF matches between AI models
      usage_hint: "start | start --quick | status | leaderboard | stop {matchId}"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - reactions:read
      - reactions:write
      - users:read
      - commands

settings:
  event_subscriptions:
    request_url: https://capture-the-flag.labs.vercel.dev/api/webhooks/slack
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
    request_url: https://capture-the-flag.labs.vercel.dev/api/webhooks/slack
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
